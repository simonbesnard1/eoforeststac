name: Data Ingestion Request
description: Request a new dataset or region to be ingested into the STAC catalog
labels: [ingestion-request]
body:
  - type: markdown
    attributes:
      value: |
        ## Data Ingestion Request
        Use this form to request a new dataset to be added to the EOForestSTAC catalog.
        Please fill in as much detail as possible — the information here is used to
        automatically generate the STAC collection, catalog items, and data writer.

  # ------------------------------------------------------------------
  # General
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### General Information"

  - type: input
    id: product-name
    attributes:
      label: Product / Dataset Name
      description: Short identifier for the dataset.
      placeholder: e.g. ALS Spain PNOA, GEDI L4D, CCI Biomass
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Dataset Description
      description: |
        A scientific description of the dataset (2-5 sentences). This will appear
        in the STAC collection metadata and the catalog browser.
      placeholder: |
        e.g. Gridded products derived from airborne laser scanning (ALS) point clouds
        using the alsdb processing pipeline. Products include canopy height model (CHM),
        digital terrain model (DTM), and structural LiDAR metrics.
    validations:
      required: true

  - type: dropdown
    id: product-type
    attributes:
      label: Product Type / Theme
      description: Which thematic category does this dataset belong to?
      options:
        - ALS / LiDAR
        - Biomass / Carbon
        - Forest Age / Demography
        - Disturbance / Change
        - Canopy Height / Structure
        - Land Use / Land Cover
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  # ------------------------------------------------------------------
  # Spatial / Temporal
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### Spatial & Temporal Extent"

  - type: input
    id: region
    attributes:
      label: Geographic Region
      description: Country or region name.
      placeholder: e.g. Spain, Brazil, Global
    validations:
      required: true

  - type: input
    id: bbox
    attributes:
      label: Bounding Box
      description: "Geographic extent as [west, south, east, north] in decimal degrees."
      placeholder: "e.g. [-9.5, 35.9, 4.4, 43.8]"
    validations:
      required: true

  - type: input
    id: crs
    attributes:
      label: Coordinate Reference System
      description: EPSG code of the data's native CRS.
      placeholder: e.g. EPSG:4326, EPSG:25830
    validations:
      required: true

  - type: input
    id: temporal-coverage
    attributes:
      label: Temporal Coverage
      description: "Start and end dates (YYYY-MM-DD)."
      placeholder: e.g. 2015-01-01 to 2023-12-31, or static (2020-01-01)
    validations:
      required: true

  # ------------------------------------------------------------------
  # Variables
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ### Variables
        List every variable to include with its unit and a short description.

  - type: textarea
    id: variables
    attributes:
      label: Variable Table
      description: |
        One variable per line: `variable_name | unit | description`.
        Use the Markdown table below as a starting point.
      value: |
        | Variable | Unit | Description |
        |----------|------|-------------|
        |          |      |             |
    validations:
      required: true

  # ------------------------------------------------------------------
  # Resolutions
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### Spatial Resolution(s)"

  - type: textarea
    id: resolutions
    attributes:
      label: Resolutions and Variables per Resolution
      description: |
        If the dataset has multiple resolutions, list each resolution
        with its GSD (ground sampling distance in metres) and the
        variables available at that resolution.
      placeholder: |
        e.g.
        - 1m (GSD: 1.0): chm, dtm, dsm
        - 10m (GSD: 10.0): biomass, gap, lai, h50, h75, h95
        - 100m (GSD: 100.0): biomass, gap, lai, h50, h75, h95
    validations:
      required: true

  # ------------------------------------------------------------------
  # Input data details
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### Input Data Details"

  - type: textarea
    id: data-source
    attributes:
      label: Data Source / Location
      description: Where is the raw data stored? Include paths, URLs, or DOIs.
      placeholder: |
        e.g.
        - Local path: /data/als/spain_pnoa/
        - DOI: https://doi.org/10.xxxx
        - S3: s3://bucket/path/
    validations:
      required: true

  - type: dropdown
    id: input-format
    attributes:
      label: Input Data Format
      options:
        - Zarr
        - GeoTIFF / VRT
        - NetCDF
        - Point Cloud (LAS/LAZ)
        - Other
    validations:
      required: true

  - type: textarea
    id: data-structure
    attributes:
      label: Input Data Structure
      description: |
        Describe how the source data is organised on disk: directory layout,
        file naming, and the dimension names used in the files.
      placeholder: |
        e.g.
        - Directory layout: one sub-folder per resolution (1m/, 10m/, 100m/)
        - Each folder is a Zarr store with dimensions (y, x)
        - Variable names match the table above
    validations:
      required: true

  - type: input
    id: nodata
    attributes:
      label: NoData / Fill Value
      description: The nodata or fill value used in the source files.
      placeholder: e.g. -9999, NaN, 255
    validations:
      required: true

  - type: input
    id: dtype
    attributes:
      label: Data Type
      description: Numeric type of the variables in the source data.
      placeholder: e.g. float32, int16, uint8
    validations:
      required: true

  - type: textarea
    id: dimensions
    attributes:
      label: Dimension Names
      description: |
        List the dimension names in the source files and what they represent.
      placeholder: |
        e.g.
        - x: easting (metres)
        - y: northing (metres)
        - time: annual snapshots
        - band: one per variable
    validations:
      required: true

  # ------------------------------------------------------------------
  # Provenance
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### Provenance & License"

  - type: input
    id: license
    attributes:
      label: License
      description: Data license identifier.
      placeholder: e.g. CC-BY-4.0, EUPL-1.2, proprietary
    validations:
      required: true

  - type: textarea
    id: citation
    attributes:
      label: Citation / DOI
      description: How should this dataset be cited? Include DOI if available.
      placeholder: |
        e.g.
        Author et al. (2024). Title. Journal. https://doi.org/10.xxxx
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Data Provider
      description: "Institution that produced the data (name and URL)."
      placeholder: e.g. GFZ Helmholtz Centre Potsdam (https://www.gfz.de)
    validations:
      required: true

  # ------------------------------------------------------------------
  # Additional
  # ------------------------------------------------------------------
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Any other relevant information: processing notes, known issues,
        transformations needed (reprojection, unit conversion), related
        datasets already in the catalog, etc.
    validations:
      required: false
